<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Prep – World Recipes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0ece6; color: #2d2d2d; min-height: 100vh; }

  header { background: white; border-bottom: 1px solid #e8e0d8; padding: 14px 28px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  header h1 { font-size: 1.25rem; font-weight: 800; color: #e60023; }
  header p { font-size: 0.8rem; color: #999; margin-top: 2px; }

  .layout { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 61px); }

  .sidebar { background: white; border-right: 1px solid #e8e0d8; padding: 20px 16px; overflow-y: auto; max-height: calc(100vh - 61px); position: sticky; top: 61px; }
  .sidebar-section { margin-bottom: 18px; }
  .sidebar-section h3 { font-size: 0.72rem; font-weight: 800; color: #aaa; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }

  .input-row { display: flex; gap: 7px; }
  .input-row input { flex: 1; padding: 9px 13px; border: 1.5px solid #eee; border-radius: 22px; font-size: 0.86rem; outline: none; background: #f8f8f8; transition: all .2s; }
  .input-row input:focus { border-color: #e60023; background: white; }
  .input-row button { padding: 9px 15px; background: #e60023; color: white; border: none; border-radius: 22px; font-size: 0.83rem; cursor: pointer; font-weight: 700; }
  .input-row button:hover { background: #c0001d; }

  .cat-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .cat-btn { padding: 4px 11px; border: 1.5px solid #e8e8e8; background: white; border-radius: 18px; font-size: 0.76rem; cursor: pointer; transition: all .15s; color: #555; }
  .cat-btn:hover { border-color: #e60023; color: #e60023; }
  .cat-btn.active { background: #ffe0e4; border-color: #e60023; color: #c0001d; font-weight: 700; }

  .divider { height: 1px; background: #f2f2f2; margin: 14px 0; }

  .ingredients-list { display: flex; flex-wrap: wrap; gap: 5px; min-height: 32px; }
  .ingredient-tag { display: flex; align-items: center; gap: 4px; background: #fff0f1; border: 1px solid #ffc7cc; border-radius: 18px; padding: 3px 9px; font-size: 0.77rem; color: #b00020; }
  .ingredient-tag button { background: none; border: none; cursor: pointer; color: #c77; font-size: 0.9rem; line-height: 1; padding: 0; }
  .ingredient-tag button:hover { color: #e60023; }
  .empty-label { color: #ccc; font-size: 0.8rem; font-style: italic; }

  .suggest-btn { width: 100%; padding: 12px; background: #e60023; color: white; border: none; border-radius: 22px; font-size: 0.93rem; font-weight: 800; cursor: pointer; margin-top: 4px; }
  .suggest-btn:hover { background: #c0001d; }
  .suggest-btn:disabled { background: #e0e0e0; color: #bbb; cursor: not-allowed; }
  .clear-btn { width: 100%; background: none; border: none; color: #ccc; font-size: 0.78rem; cursor: pointer; margin-top: 6px; }
  .clear-btn:hover { color: #e60023; text-decoration: underline; }
  .restore-btn { width: 100%; background: none; border: 1px solid #e8e8e8; border-radius: 18px; color: #888; font-size: 0.78rem; cursor: pointer; margin-top: 6px; padding: 6px; }
  .restore-btn:hover { border-color: #e60023; color: #e60023; }

  .cuisine-row { padding: 12px 20px; background: white; border-bottom: 1px solid #eee; display: flex; gap: 8px; flex-wrap: wrap; }
  .cuisine-pill { padding: 6px 16px; border: 1.5px solid #e0e0e0; background: white; border-radius: 22px; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all .15s; color: #555; white-space: nowrap; }
  .cuisine-pill:hover { border-color: #e60023; color: #e60023; }
  .cuisine-pill.active { background: #e60023; border-color: #e60023; color: white; }

  .main { display: flex; flex-direction: column; }
  .main-body { padding: 20px; flex: 1; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .top-bar h2 { font-size: 0.95rem; font-weight: 700; color: #555; }
  .filter-pills { display: flex; gap: 7px; }
  .filter-pill { padding: 6px 14px; border: 1.5px solid #ddd; background: white; border-radius: 20px; font-size: 0.78rem; cursor: pointer; font-weight: 600; color: #555; transition: all .15s; }
  .filter-pill.active { background: #111; border-color: #111; color: white; }

  .pin-grid { columns: 3 260px; column-gap: 14px; }
  @media (max-width: 900px) { .pin-grid { columns: 2 220px; } }
  @media (max-width: 600px) { .pin-grid { columns: 1; } .layout { grid-template-columns: 1fr; } }

  /* Pin card */
  .pin-card { break-inside: avoid; margin-bottom: 14px; background: white; border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform .2s, box-shadow .2s; box-shadow: 0 1px 4px rgba(0,0,0,0.09); position: relative; }
  .pin-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.13); }

  .pin-img-wrap { position: relative; overflow: hidden; background: #e8e3db; }
  .pin-img-wrap img { width: 100%; display: block; object-fit: cover; transition: transform .3s; }
  .pin-card:hover .pin-img-wrap img { transform: scale(1.03); }

  /* Hover action bar that slides up over the image */
  .card-actions { position: absolute; top: 0; left: 0; right: 0; padding: 10px; display: flex; justify-content: space-between; align-items: flex-start; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .pin-card:hover .card-actions { opacity: 1; pointer-events: all; }

  .action-btn { border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.25); transition: transform .15s; }
  .action-btn:hover { transform: scale(1.1); }
  .btn-delete { background: #ff3b30; color: white; }
  .btn-img { background: white; color: #333; font-size: 0.8rem; }

  /* No-image placeholder */
  .img-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f0ece6; color: #bbb; font-size: 0.8rem; gap: 6px; cursor: pointer; }
  .img-placeholder .ph-icon { font-size: 1.8rem; }

  .match-ribbon { position: absolute; bottom: 10px; left: 10px; padding: 3px 9px; border-radius: 18px; font-size: 0.7rem; font-weight: 800; backdrop-filter: blur(6px); }
  .ribbon-high { background: rgba(34,197,94,0.9); color: white; }
  .ribbon-med { background: rgba(234,179,8,0.9); color: white; }
  .ribbon-low { background: rgba(239,68,68,0.85); color: white; }
  .cuisine-flag { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.55); color: white; border-radius: 12px; padding: 3px 9px; font-size: 0.7rem; font-weight: 700; backdrop-filter: blur(4px); }

  .pin-body { padding: 10px 12px 12px; }
  .pin-title { font-size: 0.88rem; font-weight: 700; color: #111; margin-bottom: 4px; line-height: 1.3; }
  .pin-meta { display: flex; gap: 10px; font-size: 0.73rem; color: #999; margin-bottom: 6px; }
  .pin-tags { display: flex; flex-wrap: wrap; gap: 3px; }
  .have-tag { background: #f0fdf4; color: #15803d; border-radius: 4px; padding: 2px 6px; font-size: 0.69rem; font-weight: 600; }
  .need-tag { background: #fefce8; color: #a16207; border-radius: 4px; padding: 2px 6px; font-size: 0.69rem; font-weight: 600; }

  /* Image editor panel (slides up from bottom of image) */
  .img-editor { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.88); backdrop-filter: blur(8px); padding: 12px; display: none; z-index: 10; }
  .img-editor.open { display: block; }
  .img-editor label { display: block; color: #ddd; font-size: 0.72rem; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .img-editor input { width: 100%; padding: 7px 10px; border: 1.5px solid #555; border-radius: 8px; background: #222; color: white; font-size: 0.82rem; outline: none; margin-bottom: 8px; }
  .img-editor input:focus { border-color: #e60023; }
  .img-editor-btns { display: flex; gap: 6px; }
  .img-editor-btns button { flex: 1; padding: 7px; border: none; border-radius: 8px; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
  .btn-save-img { background: #e60023; color: white; }
  .btn-search-img { background: #444; color: #ddd; }
  .btn-cancel-img { background: #333; color: #aaa; }

  /* Recipe detail modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: white; border-radius: 20px; max-width: 740px; width: 100%; max-height: 90vh; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; }
  @media (max-width: 600px) { .modal { grid-template-columns: 1fr; } }
  .modal-img { position: relative; background: #e8e3db; }
  .modal-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px 0 0 20px; min-height: 280px; display: block; }
  @media (max-width: 600px) { .modal-img img { border-radius: 20px 20px 0 0; min-height: 200px; } }
  .modal-content { padding: 26px; overflow-y: auto; }
  .modal-close { position: absolute; top: 10px; right: 10px; background: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 1rem; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; z-index: 1; }
  .modal-cuisine-tag { display: inline-block; padding: 3px 11px; border-radius: 14px; font-size: 0.72rem; font-weight: 800; background: #f3f3f3; color: #555; margin-bottom: 8px; }
  .modal-title { font-size: 1.15rem; font-weight: 800; color: #111; margin-bottom: 6px; }
  .modal-meta { display: flex; gap: 14px; font-size: 0.79rem; color: #999; margin-bottom: 12px; }
  .modal-match { display: inline-block; padding: 3px 11px; border-radius: 18px; font-size: 0.75rem; font-weight: 700; margin-bottom: 14px; }
  .modal h4 { font-size: 0.74rem; font-weight: 800; color: #bbb; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 7px; margin-top: 14px; }
  .modal ul { padding-left: 15px; font-size: 0.85rem; line-height: 1.8; color: #444; }
  .modal ol { padding-left: 15px; font-size: 0.85rem; line-height: 1.9; color: #444; }

  .empty-state { text-align: center; padding: 80px 20px; color: #ccc; }
  .empty-state .icon { font-size: 3rem; margin-bottom: 14px; }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; }
</style>
</head>
<body>
<header>
  <div>
    <h1>🌍 Meal Prep</h1>
    <p>Add what's in your fridge → find recipes from around the world</p>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <h3>Add Ingredients</h3>
      <div class="input-row">
        <input type="text" id="ingredientInput" placeholder="e.g. chicken, rice…" />
        <button onclick="addIngredient()">Add</button>
      </div>
    </div>
    <div class="sidebar-section">
      <h3>Quick Add</h3>
      <div class="cat-grid" id="quickAdds"></div>
    </div>
    <div class="divider"></div>
    <div class="sidebar-section">
      <h3>My Fridge & Pantry</h3>
      <div class="ingredients-list" id="ingredientsList">
        <span class="empty-label">Nothing added yet</span>
      </div>
    </div>
    <button class="suggest-btn" id="suggestBtn" onclick="suggestRecipes()" disabled>🍳 Find Recipes</button>
    <button class="clear-btn" onclick="clearAll()">Clear all ingredients</button>
    <button class="restore-btn" id="restoreBtn" onclick="restoreDeleted()" style="display:none">↩ Restore deleted recipes</button>
  </aside>

  <div class="main">
    <div class="cuisine-row" id="cuisineRow" style="display:none">
      <button class="cuisine-pill active" onclick="setCuisine('All',this)">🌍 All</button>
      <button class="cuisine-pill" onclick="setCuisine('African',this)">🌍 African</button>
      <button class="cuisine-pill" onclick="setCuisine('Asian',this)">🥢 Asian</button>
      <button class="cuisine-pill" onclick="setCuisine('Middle Eastern',this)">🌙 Middle Eastern</button>
      <button class="cuisine-pill" onclick="setCuisine('Caribbean',this)">🏝️ Caribbean</button>
      <button class="cuisine-pill" onclick="setCuisine('Latin American',this)">🌶️ Latin American</button>
      <button class="cuisine-pill" onclick="setCuisine('American',this)">🦅 American</button>
      <button class="cuisine-pill" onclick="setCuisine('Mediterranean',this)">🫒 Mediterranean</button>
      <button class="cuisine-pill" onclick="setCuisine('European',this)">🍷 European</button>
    </div>
    <div class="main-body">
      <div class="top-bar">
        <h2 id="resultsLabel">Add ingredients to get started</h2>
        <div class="filter-pills" id="filterPills" style="display:none">
          <button class="filter-pill active" onclick="setFilter('all',this)">All</button>
          <button class="filter-pill" onclick="setFilter('high',this)">✅ Ready to cook</button>
          <button class="filter-pill" onclick="setFilter('med',this)">🟡 Almost there</button>
        </div>
      </div>
      <div class="pin-grid" id="pinGrid">
        <div class="empty-state"><div class="icon">🌍</div><p>Add ingredients on the left,<br>then tap <strong>Find Recipes</strong>.</p></div>
      </div>
    </div>
  </div>
</div>

<!-- Recipe detail modal -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-img">
      <img id="modalImg" src="" alt="" onerror="this.style.display='none'" />
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-content">
      <div class="modal-cuisine-tag" id="modalCuisine"></div>
      <div id="modalMatchBadge" class="modal-match"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <h4>Ingredients</h4>
      <ul id="modalIngredients"></ul>
      <h4>Instructions</h4>
      <ol id="modalSteps"></ol>
    </div>
  </div>
</div>

<script>
// ─── CONFIRMED IMAGE URLS ────────────────────────────────────────────────────
// TheMealDB (verified live) and Wikimedia Commons (Special:FilePath redirects).
// Any image that 404s gracefully falls back to a "click to add" placeholder.
const M = "https://www.themealdb.com/images/media/meals/";
const W = "https://upload.wikimedia.org/wikipedia/commons/thumb/";

const RECIPES = [
  // AFRICAN
  { name:"Jollof Rice", cuisine:"African", time:"50 min", servings:6, difficulty:"Medium",
    img: W+"b/b3/Jollof_rice_on_plate.jpg/640px-Jollof_rice_on_plate.jpg",
    ingredients:["rice","tomatoes","onion","bell pepper","chicken","olive oil"],
    allIngredients:["2 cups long-grain rice","4 tomatoes blended","2 bell peppers blended","1 onion diced","500g chicken","3 tbsp tomato paste","2 tbsp oil","Bouillon, thyme, bay leaves"],
    steps:["Blend tomatoes, bell peppers, and half the onion into a purée.","Brown chicken in oil, set aside. Sauté remaining onion.","Fry blended mix 15 min until oil floats to top.","Add 3 cups water, bouillon, seasonings, and chicken.","Add washed rice, cover tightly, cook on low 25 min."] },

  { name:"Shakshuka", cuisine:"African", time:"25 min", servings:3, difficulty:"Easy",
    img: M+"g373701551450225.jpg",
    ingredients:["eggs","tomatoes","onion","bell pepper","garlic","olive oil","cumin"],
    allIngredients:["4–5 eggs","2 cans crushed tomatoes","1 bell pepper diced","1 onion","3 cloves garlic","1 tsp cumin","1 tsp paprika","Chili flakes","2 tbsp olive oil"],
    steps:["Sauté onion and bell pepper in olive oil 5 min.","Add garlic, cumin, paprika, chili — cook 1 min.","Pour in tomatoes, simmer 10 min until thick.","Make wells, crack eggs in. Cover and cook 5–7 min.","Serve with crusty bread."] },

  { name:"Moroccan Chicken Tagine", cuisine:"African", time:"60 min", servings:4, difficulty:"Medium",
    img: W+"4/4d/Chicken_Tagine_With_Lemon_and_Olives.jpg/640px-Chicken_Tagine_With_Lemon_and_Olives.jpg",
    ingredients:["chicken","onion","garlic","lemon","olive oil","cumin"],
    allIngredients:["6 chicken thighs","1 large onion grated","4 cloves garlic","1 lemon","1 tsp cumin","1 tsp turmeric","1 tsp ginger","½ tsp cinnamon","Green olives","2 tbsp olive oil","Cilantro"],
    steps:["Marinate chicken with garlic, spices, and oil 30 min.","Brown chicken, remove. Sauté onion until golden.","Return chicken with 1 cup water, lemon, and olives.","Cover and simmer 45 min until very tender.","Finish with cilantro. Serve with couscous."] },

  { name:"Egusi Soup", cuisine:"African", time:"50 min", servings:4, difficulty:"Medium",
    img: W+"4/45/Egusi_soup.jpg/640px-Egusi_soup.jpg",
    ingredients:["ground beef","spinach","tomatoes","onion","olive oil","chili"],
    allIngredients:["300g ground beef","1 cup egusi (ground melon/pumpkin seeds)","2 tomatoes blended","1 cup spinach","1 onion","2 chili peppers","3 tbsp palm oil or olive oil","Seasoning cubes"],
    steps:["Fry blended tomatoes and chili in oil 10 min.","Add meat, seasoning, ½ cup water. Simmer 15 min.","Mix egusi with water into paste, drop spoonfuls into pot.","Stir gently, cook 15 min until egusi is done.","Add spinach, cook 3 min. Serve with fufu or rice."] },

  { name:"Suya Skewers", cuisine:"African", time:"30 min", servings:4, difficulty:"Easy",
    img: W+"1/1b/Suya.jpg/640px-Suya.jpg",
    ingredients:["ground beef","onion","garlic","ginger","chili","olive oil"],
    allIngredients:["500g beef thinly sliced","2 tbsp peanut butter","1 tsp ground ginger","1 tsp garlic powder","1 tsp paprika","1 tsp cayenne","1 tsp onion powder","Salt"],
    steps:["Mix peanut butter with all spices and salt.","Coat beef in spice mix; marinate 20 min.","Thread onto skewers.","Grill or broil 3–4 min per side until charred.","Serve with sliced onions and tomatoes."] },

  { name:"Groundnut Soup", cuisine:"African", time:"55 min", servings:4, difficulty:"Medium",
    img: W+"e/e1/Ghana_groundnut_soup.jpg/640px-Ghana_groundnut_soup.jpg",
    ingredients:["chicken","tomatoes","onion","garlic","olive oil","spinach"],
    allIngredients:["1kg chicken pieces","½ cup peanut butter","2 tomatoes blended","1 onion","3 cloves garlic","1 tbsp tomato paste","Seasoning cubes","Chili to taste"],
    steps:["Season and brown chicken in oil. Set aside.","Fry blended tomatoes, onion, garlic 10 min.","Add tomato paste, cook 3 min.","Thin peanut butter with warm water, add with chicken.","Simmer 30 min until thick. Serve with rice."] },

  // ASIAN
  { name:"Chicken Tikka Masala", cuisine:"Asian", time:"45 min", servings:4, difficulty:"Medium",
    img: W+"3/3e/Chicken_tikka_masala.jpg/640px-Chicken_tikka_masala.jpg",
    ingredients:["chicken","tomatoes","onion","garlic","ginger","butter","cumin"],
    allIngredients:["600g chicken cubed","1 can crushed tomatoes","1 onion diced","4 cloves garlic","1 tbsp ginger","2 tbsp butter","1 cup cream or coconut milk","2 tsp garam masala","1 tsp cumin","1 tsp turmeric","1 tsp paprika"],
    steps:["Marinate chicken in yogurt and half the spices 20 min. Broil until charred.","Sauté onion in butter 6 min. Add garlic, ginger, remaining spices.","Add tomatoes, simmer 10 min. Blend if desired.","Add cream and chicken, simmer 10 min.","Serve with naan or rice."] },

  { name:"Pad Thai", cuisine:"Asian", time:"25 min", servings:2, difficulty:"Easy",
    img: M+"rg9ze01763479093.jpg",
    ingredients:["eggs","shrimp","garlic","onion","lime","soy sauce"],
    allIngredients:["200g rice noodles","200g shrimp or chicken","2 eggs","3 cloves garlic","2 tbsp fish sauce","1 tbsp soy sauce","1 tbsp tamarind or lime juice","1 tbsp sugar","Bean sprouts","Spring onions","Peanuts","Lime"],
    steps:["Soak noodles in warm water 20 min, drain.","Stir-fry shrimp, push aside and scramble eggs.","Add garlic, noodles, and sauce.","Toss over high heat 2 min.","Top with bean sprouts, peanuts, and lime."] },

  { name:"Bibimbap", cuisine:"Asian", time:"40 min", servings:2, difficulty:"Medium",
    img: W+"4/44/Dolsot-bibimbap.jpg/640px-Dolsot-bibimbap.jpg",
    ingredients:["rice","eggs","spinach","carrots","garlic","soy sauce"],
    allIngredients:["2 cups cooked rice","2 eggs","1 cup spinach","1 carrot julienned","100g mushrooms","100g ground beef (optional)","2 cloves garlic","2 tbsp soy sauce","1 tbsp sesame oil","1 tbsp gochujang"],
    steps:["Cook rice and keep warm.","Sauté each vegetable separately with garlic, sesame oil, soy sauce.","Brown ground beef with soy sauce if using.","Fry eggs sunny-side up.","Arrange rice in bowls, top with everything and gochujang. Mix before eating."] },

  { name:"Thai Green Curry", cuisine:"Asian", time:"30 min", servings:3, difficulty:"Easy",
    img: M+"sstssx1487349585.jpg",
    ingredients:["chicken","coconut milk","bell pepper","spinach","garlic","ginger","lime"],
    allIngredients:["500g chicken","1 can coconut milk","1 bell pepper sliced","2 cups spinach","2 tbsp green curry paste","2 cloves garlic","1 tbsp ginger","1 tbsp fish sauce","1 tsp sugar","Basil, lime, rice"],
    steps:["Fry curry paste in oil 1 min until fragrant.","Add chicken, cook 5 min.","Pour in coconut milk, add fish sauce and sugar.","Add bell pepper, simmer 10 min.","Stir in spinach and basil, squeeze lime, serve over rice."] },

  { name:"Miso Ramen", cuisine:"Asian", time:"35 min", servings:2, difficulty:"Easy",
    img: W+"2/2e/Miso_Ramen_%28%E5%91%B3%E5%99%8C%E3%83%A9%E3%83%BC%E3%83%A1%E3%83%B3%29_by_jetalone_in_Hakata%2C_Fukuoka.jpg/640px-Miso_Ramen_%28%E5%91%B3%E5%99%8C%E3%83%A9%E3%83%BC%E3%83%A1%E3%83%B3%29_by_jetalone_in_Hakata%2C_Fukuoka.jpg",
    ingredients:["eggs","garlic","ginger","soy sauce","spinach","onion"],
    allIngredients:["2 portions ramen noodles","4 cups broth","3 tbsp miso paste","1 tbsp soy sauce","2 eggs","2 cloves garlic","1 tsp ginger","Spring onions, corn, sesame oil"],
    steps:["Soft-boil eggs 6–7 min, cool in ice bath, peel.","Sauté garlic and ginger in oil 1 min.","Add broth, simmer. Whisk in miso and soy sauce.","Cook noodles separately, divide into bowls.","Ladle hot broth over, top with halved egg and toppings."] },

  { name:"Korean Dakgalbi", cuisine:"Asian", time:"30 min", servings:3, difficulty:"Easy",
    img: W+"6/6c/Dak_galbi.jpg/640px-Dak_galbi.jpg",
    ingredients:["chicken","garlic","ginger","onion","bell pepper","soy sauce","chili"],
    allIngredients:["600g chicken thighs cubed","2 tbsp gochujang","2 tbsp soy sauce","1 tbsp sugar","3 cloves garlic","1 tsp ginger","1 onion sliced","1 bell pepper","1 cup cabbage","Sesame oil","Rice"],
    steps:["Mix gochujang, soy sauce, sugar, garlic, ginger.","Marinate chicken 15 min.","Stir-fry chicken on high heat until cooked, 7 min.","Add onion, bell pepper, cabbage; toss 3 min.","Drizzle sesame oil and serve with rice."] },

  { name:"Dal Tadka", cuisine:"Asian", time:"40 min", servings:4, difficulty:"Easy",

const QUICK_ADDS = ["Chicken","Ground Beef","Lamb","Eggs","Tofu","Salmon","Shrimp","Rice","Pasta","Lentils","Chickpeas","Canned Beans","Potatoes","Plantain","Onion","Garlic","Ginger","Tomatoes","Spinach","Bell Pepper","Eggplant","Coconut Milk","Cheese","Butter","Olive Oil","Soy Sauce","Lemon","Lime","Cumin","Chili"];

// ─── PERSISTENCE ──────────────────────────────────────────────────────────────
let myIngredients  = JSON.parse(localStorage.getItem('mealPrepIngredients')  || '[]');
let deletedRecipes = new Set(JSON.parse(localStorage.getItem('deletedRecipes')  || '[]'));
let customImages   = JSON.parse(localStorage.getItem('customImages')   || '{}');
let lastResults = [], currentCuisine = 'All', currentMatchFilter = 'all', currentDisplayed = [];

function getImg(r) { return customImages[r.name] || r.img; }

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
const qc = document.getElementById('quickAdds');
QUICK_ADDS.forEach(item => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn'; btn.textContent = item;
  btn.onclick = () => toggleIngredient(item.toLowerCase());
  qc.appendChild(btn);
});

function renderSidebar() {
  const list = document.getElementById('ingredientsList');
  const sbtn = document.getElementById('suggestBtn');
  if (!myIngredients.length) {
    list.innerHTML = '<span class="empty-label">Nothing added yet</span>';
    sbtn.disabled = true;
  } else {
    sbtn.disabled = false;
    list.innerHTML = myIngredients.map(ing =>
      `<div class="ingredient-tag">${ing}<button onclick="removeIngredient('${ing.replace(/'/g,"\\'")}')">×</button></div>`
    ).join('');
  }
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', myIngredients.includes(b.textContent.toLowerCase())));
  document.getElementById('restoreBtn').style.display = deletedRecipes.size ? 'block' : 'none';
}

function addIngredient() {
  const inp = document.getElementById('ingredientInput');
  inp.value.trim().toLowerCase().split(',').map(s=>s.trim()).filter(Boolean).forEach(v => { if (!myIngredients.includes(v)) myIngredients.push(v); });
  inp.value = ''; save();
}
function toggleIngredient(n) { myIngredients = myIngredients.includes(n) ? myIngredients.filter(i=>i!==n) : [...myIngredients,n]; save(); }
function removeIngredient(n) { myIngredients = myIngredients.filter(i=>i!==n); save(); }
function clearAll() {
  myIngredients = []; save(); lastResults = []; currentDisplayed = [];
  document.getElementById('pinGrid').innerHTML = `<div class="empty-state"><div class="icon">🌍</div><p>Add ingredients on the left,<br>then tap <strong>Find Recipes</strong>.</p></div>`;
  document.getElementById('resultsLabel').textContent = 'Add ingredients to get started';
  document.getElementById('filterPills').style.display = 'none';
  document.getElementById('cuisineRow').style.display = 'none';
}
function restoreDeleted() { deletedRecipes.clear(); localStorage.removeItem('deletedRecipes'); renderSidebar(); if (lastResults.length) applyFilters(); }
function save() { localStorage.setItem('mealPrepIngredients', JSON.stringify(myIngredients)); renderSidebar(); }
document.getElementById('ingredientInput').addEventListener('keydown', e => { if (e.key==='Enter') addIngredient(); });

// ─── MATCHING ─────────────────────────────────────────────────────────────────
function matchRecipe(r) {
  const have = r.ingredients.filter(i => myIngredients.some(m => m.includes(i)||i.includes(m)));
  const need = r.ingredients.filter(i => !myIngredients.some(m => m.includes(i)||i.includes(m)));
  return { have, need, pct: have.length/r.ingredients.length };
}

function suggestRecipes() {
  lastResults = RECIPES.filter(r => !deletedRecipes.has(r.name))
    .map(r => ({ ...r, ...matchRecipe(r) })).filter(r => r.pct > 0).sort((a,b) => b.pct - a.pct);
  currentCuisine = 'All'; currentMatchFilter = 'all';
  document.querySelectorAll('.filter-pill').forEach((b,i) => b.classList.toggle('active', i===0));
  document.querySelectorAll('.cuisine-pill').forEach((b,i) => b.classList.toggle('active', i===0));
  document.getElementById('filterPills').style.display = 'flex';
  document.getElementById('cuisineRow').style.display = 'flex';
  applyFilters();
}

function applyFilters() {
  let f = lastResults.filter(r => !deletedRecipes.has(r.name));
  if (currentCuisine !== 'All') f = f.filter(r => r.cuisine === currentCuisine);
  if (currentMatchFilter === 'high') f = f.filter(r => r.pct >= 0.85);
  if (currentMatchFilter === 'med') f = f.filter(r => r.pct >= 0.5 && r.pct < 0.85);
  currentDisplayed = f;
  document.getElementById('resultsLabel').textContent = `${f.length} recipe${f.length!==1?'s':''} found${currentCuisine!=='All'?' · '+currentCuisine:''}`;
  renderPins(f);
}

// ─── RENDER CARDS ─────────────────────────────────────────────────────────────
const heights = [170,195,215,180,205,190];
function renderPins(recipes) {
  const grid = document.getElementById('pinGrid');
  if (!recipes.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🤔</div><p>No matches with these filters.<br>Try a different cuisine or add more ingredients.</p></div>`;
    return;
  }
  grid.innerHTML = recipes.map((r, idx) => {
    const rc = r.pct>=0.85?'ribbon-high':r.pct>=0.5?'ribbon-med':'ribbon-low';
    const rt = r.pct>=0.85?'✅ Ready to cook':r.pct>=0.5?'🟡 Almost there':'🛒 Need a few';
    const imgUrl = getImg(r);
    const nameEsc = r.name.replace(/'/g,"\\'").replace(/"/g,"&quot;");
    return `
    <div class="pin-card" id="card-${idx}" data-name="${nameEsc}">
      <div class="pin-img-wrap" style="min-height:${heights[idx%heights.length]}px" onclick="openModal(${idx})">
        <img src="${imgUrl}" alt="${r.name}" loading="lazy" style="min-height:${heights[idx%heights.length]}px"
          onerror="this.style.display='none'; this.nextElementSibling && (this.nextElementSibling.style.display='flex')" />
        <div class="img-placeholder" style="display:none;min-height:${heights[idx%heights.length]}px" onclick="openImgEditor(event,${idx})">
          <span class="ph-icon">📷</span><span>No image — click to add</span>
        </div>
        <div class="card-actions">
          <button class="action-btn btn-delete" onclick="deleteCard(event,${idx})" title="Remove recipe">✕</button>
          <button class="action-btn btn-img" onclick="openImgEditor(event,${idx})" title="Change image">📷</button>
        </div>
        <div class="match-ribbon ${rc}">${rt}</div>
        <div class="cuisine-flag">${r.cuisine}</div>
        <!-- inline image editor -->
        <div class="img-editor" id="editor-${idx}">
          <label>Paste image URL or search online:</label>
          <input type="text" id="imgUrl-${idx}" placeholder="https://..." value="${imgUrl.startsWith('https://upload.wikimedia') || imgUrl.startsWith('https://www.themealdb') ? '' : imgUrl}" />
          <div class="img-editor-btns">
            <button class="btn-save-img" onclick="saveImg(event,${idx})">Save</button>
            <button class="btn-search-img" onclick="searchImg(event,'${nameEsc}')">🔍 Search</button>
            <button class="btn-cancel-img" onclick="closeImgEditor(event,${idx})">Cancel</button>
          </div>
        </div>
      </div>
      <div class="pin-body" onclick="openModal(${idx})" style="cursor:pointer">
        <div class="pin-title">${r.name}</div>
        <div class="pin-meta"><span>⏱ ${r.time}</span><span>👥 ${r.servings}</span><span>📊 ${r.difficulty}</span></div>
        <div class="pin-tags">
          ${r.have.map(i=>`<span class="have-tag">✓ ${i}</span>`).join('')}
          ${r.need.map(i=>`<span class="need-tag">+ ${i}</span>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── DELETE ──────────────────────────────────────────────────────────────────
function deleteCard(e, idx) {
  e.stopPropagation();
  const r = currentDisplayed[idx];
  if (!r) return;
  deletedRecipes.add(r.name);
  localStorage.setItem('deletedRecipes', JSON.stringify([...deletedRecipes]));
  // Animate out
  const card = document.getElementById('card-'+idx);
  if (card) { card.style.opacity='0'; card.style.transform='scale(0.9)'; card.style.transition='all .25s'; setTimeout(()=>applyFilters(),260); }
  renderSidebar();
}

// ─── IMAGE EDITOR ─────────────────────────────────────────────────────────────
function openImgEditor(e, idx) {
  e.stopPropagation();
  // Close any other open editors first
  document.querySelectorAll('.img-editor.open').forEach(el => el.classList.remove('open'));
  const editor = document.getElementById('editor-'+idx);
  if (editor) {
    editor.classList.add('open');
    // Pre-fill with current custom image if any
    const r = currentDisplayed[idx];
    if (r && customImages[r.name]) {
      document.getElementById('imgUrl-'+idx).value = customImages[r.name];
    }
    document.getElementById('imgUrl-'+idx).focus();
  }
}
function closeImgEditor(e, idx) {
  e.stopPropagation();
  const editor = document.getElementById('editor-'+idx);
  if (editor) editor.classList.remove('open');
}
function saveImg(e, idx) {
  e.stopPropagation();
  const r = currentDisplayed[idx]; if (!r) return;
  const url = document.getElementById('imgUrl-'+idx).value.trim();
  if (url) {
    customImages[r.name] = url;
    localStorage.setItem('customImages', JSON.stringify(customImages));
  } else {
    delete customImages[r.name];
    localStorage.setItem('customImages', JSON.stringify(customImages));
  }
  applyFilters(); // re-render with new image
}
function searchImg(e, name) {
  e.stopPropagation();
  window.open('https://www.google.com/search?tbm=isch&q='+encodeURIComponent(name+' food dish recipe'), '_blank');
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(idx) {
  const r = currentDisplayed[idx]; if (!r) return;
  // Close any image editors first
  document.querySelectorAll('.img-editor.open').forEach(el => el.classList.remove('open'));
  const mc = r.pct>=0.85?'#22c55e':r.pct>=0.5?'#eab308':'#ef4444';
  const mt = r.pct>=0.85?'✅ Ready to cook':r.pct>=0.5?'🟡 Almost there':'🛒 Need a few things';
  const modalImg = document.getElementById('modalImg');
  modalImg.style.display = 'block';
  modalImg.src = getImg(r);
  modalImg.alt = r.name;
  document.getElementById('modalCuisine').textContent = r.cuisine;
  document.getElementById('modalTitle').textContent = r.name;
  document.getElementById('modalMeta').innerHTML = `<span>⏱ ${r.time}</span><span>👥 ${r.servings} servings</span><span>📊 ${r.difficulty}</span>`;
  document.getElementById('modalMatchBadge').textContent = mt;
  document.getElementById('modalMatchBadge').style.cssText = `background:${mc}22;color:${r.pct>=0.85?'#15803d':r.pct>=0.5?'#a16207':'#b91c1c'}`;
  document.getElementById('modalIngredients').innerHTML = r.allIngredients.map(i=>`<li>${i}</li>`).join('');
  document.getElementById('modalSteps').innerHTML = r.steps.map(s=>`<li>${s}</li>`).join('');
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModalDirect() { document.getElementById('modalBg').classList.remove('open'); document.body.style.overflow=''; }
function closeModal(e) { if (e.target===document.getElementById('modalBg')) closeModalDirect(); }

function setCuisine(c,btn) { currentCuisine=c; document.querySelectorAll('.cuisine-pill').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyFilters(); }
function setFilter(f,btn) { currentMatchFilter=f; document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyFilters(); }

// Close editors when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.img-editor') && !e.target.closest('.btn-img') && !e.target.closest('.img-placeholder')) {
    document.querySelectorAll('.img-editor.open').forEach(el=>el.classList.remove('open'));
  }
});

renderSidebar();
if (myIngredients.length) suggestRecipes();
</script>
</body>
</html>
